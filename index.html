    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CloudCertPrep",
      "url": "https://www.cloudcertprep.io/",
      "description": "Free AWS certification practice exams with mock tests, domain practice, spaced repetition, and progress tracking.",
      "applicationCategory": "EducationApplication",

      "offers": {
        "@type": "Offer",

      }

    </script>
    
    <!-- FAQ Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is CloudCertPrep really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, 100% free. No hidden fees, no premium tiers, no paywalls, and no ads. All 1,050+ practice questions, mock exams, and progress tracking features are completely free."
          }
        },
        {
          "@type": "Question",
          "name": "How many practice questions are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Over 1,050 practice questions for AWS Cloud Practitioner (CLF-C02), with more certifications coming soon. Questions are up to date with the 2026 exam guide."
          }
        },
        {
          "@type": "Question",
          "name": "What is the format of the mock exams?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mock exams follow the same format as the real AWS exam: 65 questions in 90 minutes. You need a scaled score of 700/1000 to pass, just like the actual certification exam."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No account is required to practice. However, creating a free account allows you to save your progress, track exam history, and monitor your domain mastery over time."
          }
        },
        {
          "@type": "Question",
          "name": "How does domain practice work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Domain practice lets you focus on one exam domain at a time with instant feedback. You can practice specific areas where you need improvement and track your mastery percentage for each domain."
          }
        },
        {
          "@type": "Question",
          "name": "Is this an AWS exam simulator?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, CloudCertPrep is a full AWS exam simulator with timed mock exams that replicate the real certification experience. Practice with 65-question exams, 90-minute timers, and scaled scoring (700/1000 to pass) just like the actual AWS Cloud Practitioner exam."
          }
        },
        {
          "@type": "Question",
          "name": "What certifications does CloudCertPrep support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Currently supports AWS Cloud Practitioner (CLF-C02) with 1,050 practice questions. AWS Solutions Architect Associate (SAA-C03) is coming soon. All content is updated for the 2026 exam guides."
          }
        }
      ]
    }
    </script>

    <!-- Google Analytics (deferred until page is interactive, requires consent) -->
    <script>
      (function(){
        var id='%VITE_GA_MEASUREMENT_ID%';
        if(!id||id.charAt(0)==='%')return;
        
        // Check for cookie consent
        var consent=localStorage.getItem('cloudcertprep_cookie_consent');
        if(consent!=='accepted')return;
        
        function load(){
          window.dataLayer=window.dataLayer||[];
          window.gtag=function(){dataLayer.push(arguments);};
          window.gtag('js',new Date());
          window.gtag('config',id);
          var s=document.createElement('script');
          s.async=true;
          s.src='https://www.googletagmanager.com/gtag/js?id='+id;
          document.head.appendChild(s);
        }
        
        if('requestIdleCallback'in window){
          requestIdleCallback(load)
        }else{
          setTimeout(load,1)
        }
      })();
    </script>
